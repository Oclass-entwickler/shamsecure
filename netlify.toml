# Netlify Configuration for ShamSecure
# This file is optional but recommended for Netlify deployments

[build]
  # Build command for Node.js server
  command = "npm install"
  # Publish directory for static files
  publish = "."
  
# Serverless function configuration
[functions]
  # Node.js version
  node_bundler = "esbuild"
  
# Redirect API and admin routes to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# Redirect admin routes to dedicated admin function
[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

# Redirect /index to /
[[redirects]]
  from = "/index"
  to = "/"
  status = 301

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
